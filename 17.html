<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Nyomtatás Szerkesztő</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* --- PRO APPLIKÁCIÓS STÍLUSOK --- */
:root {
    --bg-studio: #0f172a;
    --bg-card: rgba(30, 41, 59, 1);
    --accent: #38bdf8;
    --accent-hover: #0ea5e9;
    --text-main: #f8fafc;
    --text-fill: #000000;
    --text-stroke: #000000;
    --stroke-width: 0px;
}

/* Tájolás alapú dinamikus méretek */
body.mode-landscape {
    --a4-width: 1123px;
    --a4-height: 794px;
}
body.mode-portrait {
    --a4-width: 794px;
    --a4-height: 1123px;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-studio);
    color: var(--text-main);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Fejléc */
header {
    background: var(--bg-card);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    padding: 0.85rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    z-index: 10;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    gap: 1rem;
    flex-wrap: wrap;
}

.logo-area h1 {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: -0.05em;
    background: linear-gradient(to right, #fff, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.logo-area p {
    font-size: 0.7rem;
    color: #94a3b8;
    margin-top: 2px;
}

.toolbar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
}

/* Vezérlő egységek */
.control-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background-color: rgba(15, 23, 42, 0.6);
    padding: 0.4rem 0.7rem;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.08);
}

.control-group label {
    font-size: 0.75rem;
    color: #94a3b8;
    font-weight: 600;
    user-select: none;
}

.select-orientation {
    background-color: #1e293b;
    color: #f8fafc;
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 0.65rem 0.9rem;
    font-size: 0.9rem;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    outline: none;
    font-family: inherit;
    transition: all 0.2s ease;
}
.select-orientation:focus {
    border-color: var(--accent);
}

/* Szín minta (swatch) gombok */
.color-swatches {
    display: flex;
    gap: 0.35rem;
}

.swatch {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid rgba(255, 255, 255, 0.25);
    transition: all 0.15s ease;
    position: relative;
    padding: 0;
}

.swatch:hover {
    transform: scale(1.1);
    border-color: rgba(255, 255, 255, 0.6);
}

.swatch.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.4);
    transform: scale(1.08);
}

/* Egyéni színválasztó */
.color-picker-wrapper {
    position: relative;
    width: 28px;
    height: 28px;
}

.color-picker-wrapper input[type="color"] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 2px solid rgba(255, 255, 255, 0.25);
    border-radius: 6px;
    cursor: pointer;
    padding: 0;
    background: none;
}

.color-picker-wrapper input[type="color"]::-webkit-color-swatch-wrapper {
    padding: 0;
}
.color-picker-wrapper input[type="color"]::-webkit-color-swatch {
    border: none;
    border-radius: 4px;
}

/* Körvonal vastagság választó */
.stroke-buttons {
    display: flex;
    gap: 0.25rem;
}

.stroke-btn {
    background-color: #1e293b;
    color: #f8fafc;
    border: 1px solid rgba(255, 255, 255, 0.15);
    padding: 0.4rem 0.7rem;
    font-size: 0.8rem;
    font-weight: 700;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s ease;
    min-width: 38px;
}

.stroke-btn:hover {
    background-color: #334155;
}

.stroke-btn.active {
    background-color: var(--accent);
    color: #0f172a;
    border-color: var(--accent);
}

.btn-print {
    background-color: var(--accent);
    color: #0f172a;
    border: none;
    padding: 0.7rem 1.4rem;
    font-size: 0.9rem;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
}

.btn-print:hover {
    background-color: var(--accent-hover);
    transform: translateY(-1px);
}

/* Munkafolyamat konténer */
.workspace {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem;
    overflow: hidden;
    position: relative;
}

/* Skálázódó lap-burkoló */
.paper-scaler {
    transform-origin: center center;
    transition: transform 0.1s ease-out;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* --- A4 REÁLIS PAPÍR LAP --- */
.paper-canvas {
    width: var(--a4-width);
    height: var(--a4-height);
    background-color: #ffffff;
    color: #1e293b;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
    border-radius: 2px;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
    overflow: hidden;
    transition: width 0.2s ease, height 0.2s ease;
}

/* Intelligens szövegtároló - TÖKÉLETESEN KÖZÉPRE IGAZÍTVA */
.text-container {
    width: 100%;
    height: 100%;
    outline: none;
    border: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-weight: 900;
    line-height: 1.05;
    white-space: pre;
    overflow: hidden;
    position: relative;
    z-index: 2;
    /* SZÍNEZÉSI TULAJDONSÁGOK */
    color: var(--text-fill);
    -webkit-text-stroke: var(--stroke-width) var(--text-stroke);
    paint-order: stroke fill;
}

/* Placeholder */
.text-container:empty:before {
    content: "Kattints ide és kezdj el gépelni... (Csak Enterrel nyílik új sor!)";
    color: #cbd5e1;
    font-weight: 400;
    font-size: 2rem;
    line-height: 1.5;
    pointer-events: none;
    -webkit-text-stroke: 0;
}

/* Láthatatlan Árnyék-mérő a háttérben */
#measure-clone {
    position: absolute;
    visibility: hidden;
    pointer-events: none;
    width: auto;
    height: auto;
    text-align: center;
    font-weight: 900;
    line-height: 1.05;
    white-space: pre;
    z-index: 1;
    /* A mérőnek ugyanazokat a stroke beállításokat kell tükröznie */
    -webkit-text-stroke: var(--stroke-width) var(--text-stroke);
    paint-order: stroke fill;
}

/* --- NYOMTATÁSI STÍLUSOK (STATIKUS RÉSZ) --- */
@media print {
    body {
        background: none;
        color: #000;
        padding: 0;
        margin: 0;
        height: auto;
        overflow: visible;
    }

    header {
        display: none;
    }

    .workspace {
        padding: 0;
        margin: 0;
        display: block;
        overflow: visible;
    }

    .paper-scaler {
        transform: none !important;
    }

    .paper-canvas {
        box-shadow: none;
        padding: 40px;
        position: absolute;
        top: 0;
        left: 0;
        page-break-inside: avoid;
    }

    .text-container {
        color: var(--text-fill) !important;
        -webkit-text-stroke: var(--stroke-width) var(--text-stroke) !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
}
</style>
</head>
<body class="mode-landscape">

<header>
    <div class="logo-area">
        <h1>PRO NYOMTATÁS SZERKESZTŐ</h1>
        <p id="sub-label">A4 Fektetett • Tökéletes középre igazítás • Manuális sortörés (Enter)</p>
    </div>
    <div class="toolbar">

        <!-- TÁJOLÁS -->
        <select class="select-orientation" id="orientation-select">
            <option value="landscape" selected>Fektetett (A4)</option>
            <option value="portrait">Álló (A4)</option>
        </select>

        <!-- BETŰSZÍN VÁLASZTÓ -->
        <div class="control-group">
            <label>Betű</label>
            <div class="color-swatches" id="fill-swatches">
                <button class="swatch active" data-color="#000000" style="background:#000000" title="Fekete"></button>
                <button class="swatch" data-color="#dc2626" style="background:#dc2626" title="Piros"></button>
                <button class="swatch" data-color="#2563eb" style="background:#2563eb" title="Kék"></button>
                <button class="swatch" data-color="#16a34a" style="background:#16a34a" title="Zöld"></button>
                <button class="swatch" data-color="#eab308" style="background:#eab308" title="Sárga"></button>
                <button class="swatch" data-color="#ffffff" style="background:#ffffff" title="Fehér (csak körvonallal!)"></button>
            </div>
            <div class="color-picker-wrapper" title="Egyéni betűszín">
                <input type="color" id="custom-fill" value="#000000">
            </div>
        </div>

        <!-- KÖRVONAL VASTAGSÁG -->
        <div class="control-group">
            <label>Körvonal</label>
            <div class="stroke-buttons" id="stroke-buttons">
                <button class="stroke-btn active" data-stroke="0">0</button>
                <button class="stroke-btn" data-stroke="1">1</button>
                <button class="stroke-btn" data-stroke="2">2</button>
                <button class="stroke-btn" data-stroke="3">3</button>
                <button class="stroke-btn" data-stroke="5">5</button>
            </div>
            <div class="color-picker-wrapper" title="Körvonal színe">
                <input type="color" id="custom-stroke" value="#000000">
            </div>
        </div>

        <!-- NYOMTATÁS -->
        <button class="btn-print" onclick="window.print()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
            Nyomtatás
        </button>
    </div>
</header>

<div class="workspace" id="workspace">
    <div class="paper-scaler" id="scaler">
        <div class="paper-canvas" id="paper">
            <div id="measure-clone"></div>
            <div class="text-container" id="editor" contenteditable="true" spellcheck="false"></div>
        </div>
    </div>
</div>

<script>
const editor = document.getElementById('editor');
const clone = document.getElementById('measure-clone');
const scaler = document.getElementById('scaler');
const workspace = document.getElementById('workspace');
const paper = document.getElementById('paper');
const orientationSelect = document.getElementById('orientation-select');
const subLabel = document.getElementById('sub-label');
const fillSwatches = document.getElementById('fill-swatches');
const strokeButtons = document.getElementById('stroke-buttons');
const customFill = document.getElementById('custom-fill');
const customStroke = document.getElementById('custom-stroke');

const dynamicPrintStyle = document.createElement('style');
document.head.appendChild(dynamicPrintStyle);

// --- 1. SZÖVEGMÉRETEZŐ ALGORITMUS - TELJES LAPKITÖLTÉSSEL ---
function autoFitText() {
    if (editor.textContent.trim() === "") {
        editor.style.fontSize = "";
        return;
    }

    const maxWidth = paper.clientWidth - 80;
    const maxHeight = paper.clientHeight - 80;

    // A mérő klón pontosan ugyanúgy néz ki mint az editor
    clone.innerHTML = editor.innerHTML;
    clone.style.width = "auto";

    // Bináris keresés a maximális, még elférő betűméretért
    let minSize = 1;
    let maxSize = 2000;
    let optimalSize = minSize;

    while (minSize <= maxSize) {
        let midSize = Math.floor((minSize + maxSize) / 2);
        clone.style.fontSize = midSize + "px";

        if (clone.scrollHeight <= maxHeight && clone.scrollWidth <= maxWidth) {
            optimalSize = midSize;
            minSize = midSize + 1;
        } else {
            maxSize = midSize - 1;
        }
    }

    editor.style.fontSize = optimalSize + "px";
}

// --- 2. RESPONSIVE PAPÍR-SKÁLÁZÁS ---
function responsiveScale() {
    const isPortrait = orientationSelect.value === 'portrait';
    const targetWidth = isPortrait ? 794 : 1123;
    const targetHeight = isPortrait ? 1123 : 794;

    const availableWidth = workspace.clientWidth - 40;
    const availableHeight = workspace.clientHeight - 40;

    const scaleX = availableWidth / targetWidth;
    const scaleY = availableHeight / targetHeight;

    const scale = Math.min(scaleX, scaleY, 1);
    scaler.style.transform = `scale(${scale})`;
}

// --- TÁJOLÁS VÁLTÓ LOGIKA ---
function handleOrientationChange() {
    const isPortrait = orientationSelect.value === 'portrait';

    if (isPortrait) {
        document.body.className = "mode-portrait";
        subLabel.textContent = "A4 Álló • Tökéletes középre igazítás • Manuális sortörés (Enter)";
        dynamicPrintStyle.innerHTML = `@media print { @page { size: A4 portrait; margin: 0; } .paper-canvas { width: 210mm; height: 297mm; } }`;
    } else {
        document.body.className = "mode-landscape";
        subLabel.textContent = "A4 Fektetett • Tökéletes középre igazítás • Manuális sortörés (Enter)";
        dynamicPrintStyle.innerHTML = `@media print { @page { size: A4 landscape; margin: 0; } .paper-canvas { width: 297mm; height: 210mm; } }`;
    }

    responsiveScale();
    setTimeout(autoFitText, 50);
}

// --- 3. SZÍNEZÉSI LOGIKA ---
function setFillColor(color) {
    document.documentElement.style.setProperty('--text-fill', color);
    customFill.value = color;

    // Aktív swatch frissítése
    document.querySelectorAll('#fill-swatches .swatch').forEach(s => {
        s.classList.toggle('active', s.dataset.color === color);
    });
}

function setStrokeWidth(width) {
    document.documentElement.style.setProperty('--stroke-width', width + 'px');

    // Aktív gomb frissítése
    document.querySelectorAll('#stroke-buttons .stroke-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.stroke === String(width));
    });

    // Méretezés újraszámolása mert a stroke befolyásolja a méretet
    setTimeout(autoFitText, 10);
}

function setStrokeColor(color) {
    document.documentElement.style.setProperty('--text-stroke', color);
    customStroke.value = color;
}

// Swatch (előre definiált szín) gombok
fillSwatches.addEventListener('click', (e) => {
    const swatch = e.target.closest('.swatch');
    if (!swatch) return;
    setFillColor(swatch.dataset.color);
});

// Egyéni betűszín
customFill.addEventListener('input', (e) => {
    document.documentElement.style.setProperty('--text-fill', e.target.value);
    // Aktív swatch eltávolítása mert egyéni szín lett választva
    document.querySelectorAll('#fill-swatches .swatch').forEach(s => {
        s.classList.toggle('active', s.dataset.color === e.target.value);
    });
});

// Körvonal vastagság gombok
strokeButtons.addEventListener('click', (e) => {
    const btn = e.target.closest('.stroke-btn');
    if (!btn) return;
    setStrokeWidth(parseInt(btn.dataset.stroke, 10));
});

// Egyéni körvonal szín
customStroke.addEventListener('input', (e) => {
    setStrokeColor(e.target.value);
});

// --- 4. ESEMÉNYKEZELŐK ---
orientationSelect.addEventListener('change', handleOrientationChange);

editor.addEventListener('input', autoFitText);

editor.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        setTimeout(autoFitText, 0);
    }
});

// INTELLIGENS BEILLESZTÉS: A bemásolt szöveg automatikusan kitölti a teljes lapot
editor.addEventListener('paste', (e) => {
    e.preventDefault();
    const text = (e.originalEvent || e).clipboardData.getData('text/plain');

    if (!text.trim()) return;

    const maxWidth = paper.clientWidth - 80;
    const maxHeight = paper.clientHeight - 80;

    // Háttér mérő doboz létrehozása
    const tempMeasure = document.createElement('div');
    tempMeasure.style.position = 'absolute';
    tempMeasure.style.visibility = 'hidden';
    tempMeasure.style.whiteSpace = 'pre';
    tempMeasure.style.fontFamily = window.getComputedStyle(editor).fontFamily;
    tempMeasure.style.fontWeight = window.getComputedStyle(editor).fontWeight;
    tempMeasure.style.lineHeight = '1.05';
    tempMeasure.style.textAlign = 'center';
    document.body.appendChild(tempMeasure);

    // OKOS SORTÖRÉS: kiválasztjuk az optimális betűméretet és sortörést együtt
    // hogy a szöveg a lehető legjobban kitöltse a lapot
    function wrapTextAtSize(fontSize) {
        tempMeasure.style.fontSize = fontSize + 'px';
        const paragraphs = text.split('\n');
        const wrappedParagraphs = paragraphs.map(para => {
            if (para.trim() === '') return '';
            const words = para.split(' ');
            let currentLine = '';
            let resultLines = [];

            for (let word of words) {
                let testLine = currentLine ? currentLine + ' ' + word : word;
                tempMeasure.textContent = testLine;

                if (tempMeasure.scrollWidth > maxWidth) {
                    if (currentLine) {
                        resultLines.push(currentLine);
                        currentLine = word;
                    } else {
                        resultLines.push(word);
                        currentLine = '';
                    }
                } else {
                    currentLine = testLine;
                }
            }
            if (currentLine) resultLines.push(currentLine);
            return resultLines.join('\n');
        });
        return wrappedParagraphs.join('\n');
    }

    // Bináris keresés: a legnagyobb fontméret, amelynél a tördelt szöveg
    // még belefér a lap magasságába
    let minSize = 8;
    let maxSize = 500;
    let bestSize = minSize;
    let bestWrappedText = '';

    while (minSize <= maxSize) {
        const midSize = Math.floor((minSize + maxSize) / 2);
        const wrapped = wrapTextAtSize(midSize);
        tempMeasure.textContent = wrapped;

        if (tempMeasure.scrollHeight <= maxHeight && tempMeasure.scrollWidth <= maxWidth) {
            bestSize = midSize;
            bestWrappedText = wrapped;
            minSize = midSize + 1;
        } else {
            maxSize = midSize - 1;
        }
    }

    // Fallback ha valami nagyon szélsőséges
    if (!bestWrappedText) {
        bestWrappedText = wrapTextAtSize(bestSize);
    }

    document.body.removeChild(tempMeasure);

    // Beillesztjük a tördelt szöveget, majd autoFitText újra optimalizál
    document.execCommand('insertText', false, bestWrappedText);
    setTimeout(autoFitText, 0);
});

window.addEventListener('resize', () => {
    responsiveScale();
    autoFitText();
});

window.addEventListener('scroll', () => {
    window.scrollTo(0, 0);
});

// Nyomtatás előtt és után újraméretezés (hogy a print view tökéletes legyen)
window.addEventListener('beforeprint', autoFitText);
window.addEventListener('afterprint', () => {
    responsiveScale();
    autoFitText();
});

// Kezdőállapot meghívások
handleOrientationChange();
editor.focus();

window.addEventListener('load', () => {
    responsiveScale();
    autoFitText();
});
</script>
</body>
</html>
