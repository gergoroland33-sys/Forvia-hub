<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Forvia SMT | Pro Premium Műszaknaptár</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        :root {
            /* Premium Dark Theme */
            --bg-base: #020617;
            --bg-panel: rgba(15, 23, 42, 0.7);
            --bg-card: rgba(30, 41, 59, 0.8);
            --border: rgba(51, 65, 85, 0.6);
            --border-light: rgba(71, 85, 105, 0.4);
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --danger: #ef4444; 
            
            /* Shift Colors */
            --color-a: #3b82f6; /* Kék */
            --color-b: #10b981; /* Zöld */
            --color-c: #f59e0b; /* Sárga */
            --color-d: #ef4444; /* Piros */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100dvh;
            overflow: hidden;
        }

        /* --- APP HEADER --- */
        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; 
            background: var(--bg-panel);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            height: 60px; flex-shrink: 0;
            z-index: 10;
        }

        .logo-area h1 { margin: 0; font-size: 1.3rem; font-weight: 900; letter-spacing: 0.5px; }
        .logo-area span { color: var(--accent); }

        .header-actions { display: flex; gap: 10px; }

        .btn-modern {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
            color: var(--text-main); padding: 8px 16px; border-radius: 12px;
            font-size: 0.8rem; font-weight: 700; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; gap: 8px;
        }
        .btn-modern:hover { background: rgba(255, 255, 255, 0.1); }
        .btn-modern:active { transform: scale(0.95); }
        
        .btn-today { color: var(--danger); border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.1); }
        .btn-today:hover { background: rgba(239, 68, 68, 0.2); }

        /* --- SEGMENTED CONTROL (Szűrő) --- */
        .filter-container {
            padding: 15px 20px;
            background: var(--bg-base);
            z-index: 5;
        }
        .segmented-control {
            display: flex; background: rgba(15, 23, 42, 0.8);
            border-radius: 12px; padding: 4px; border: 1px solid var(--border);
            position: relative;
        }
        .seg-btn {
            flex: 1; text-align: center; padding: 8px 0;
            font-size: 0.8rem; font-weight: 700; color: var(--text-muted);
            cursor: pointer; z-index: 2; transition: color 0.3s;
            border-radius: 8px;
        }
        .seg-btn.active { color: var(--text-main); }
        .seg-slider {
            position: absolute; top: 4px; bottom: 4px;
            background: rgba(255,255,255,0.1); border-radius: 8px;
            z-index: 1; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s;
        }

        /* --- LAYOUT WRAPPER --- */
        .main-layout {
            display: flex; flex: 1; overflow: hidden;
            flex-direction: column; /* Default: Mobile */
        }

        /* --- CALENDAR PANEL --- */
        .calendar-section {
            flex: 1; display: flex; flex-direction: column;
            padding: 0 15px 15px 15px; overflow: hidden;
        }

        .cal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px;
        }
        .cal-nav-btn {
            background: transparent; border: none; color: var(--text-muted);
            font-size: 1.5rem; cursor: pointer; padding: 5px 15px;
            transition: color 0.2s;
        }
        .cal-nav-btn:hover { color: var(--text-main); }
        .cal-nav-btn:active { transform: scale(0.9); }
        .month-title { font-size: 1.2rem; font-weight: 900; letter-spacing: 1px; }

        .weekdays {
            display: grid; grid-template-columns: repeat(7, 1fr);
            text-align: center; margin-bottom: 10px;
        }
        .weekday { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }

        .cal-grid-wrapper {
            flex: 1; overflow: hidden; position: relative;
        }
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 6px; height: 100%; align-content: start;
            overflow-y: auto; padding-right: 4px; padding-bottom: 20px;
            /* Swipe animáció előkészítés */
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
        }
        .calendar-grid::-webkit-scrollbar { width: 4px; }
        .calendar-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* Cellák */
        .cell {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 6px; cursor: pointer;
            min-height: 85px; display: flex; flex-direction: column;
            transition: all 0.2s; position: relative;
        }
        .cell:active { transform: scale(0.95); }
        .cell.empty { background: transparent; border: none; cursor: default; }
        .cell:hover:not(.empty) { background: rgba(51, 65, 85, 0.4); border-color: var(--text-muted); }

        .cell.today {
            border: 2px solid var(--danger); background: rgba(239, 68, 68, 0.05);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.15);
        }
        
        .cell-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: auto;}
        .date-num { font-size: 0.9rem; font-weight: 800; color: var(--text-main); }
        .cell.weekend .date-num { color: var(--text-muted); }
        .cell.today .date-num { color: var(--danger); }
        .holiday-dot { width: 6px; height: 6px; background: var(--danger); border-radius: 50%; box-shadow: 0 0 5px var(--danger);}

        /* Műszak Címkék (Pills) */
        .shifts-container { display: flex; flex-direction: column; gap: 4px; margin-top: 5px; }
        .shift-pill {
            font-size: 0.65rem; font-weight: 800; padding: 3px 6px; border-radius: 6px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .pill-A { background: rgba(59, 130, 246, 0.2); color: #93c5fd; }
        .pill-B { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        .pill-C { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }
        .pill-D { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }

        /* Dimmed for filtering */
        .cell.dimmed { opacity: 0.2; filter: grayscale(1); pointer-events: none; }
        .shift-pill.highlight { justify-content: center; font-size: 0.75rem; padding: 6px; border: 1px solid currentColor; }

        /* --- INSPECTOR (Részletek) --- */
        .inspector-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 100; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .inspector {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: var(--bg-panel); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); border-radius: 24px 24px 0 0;
            padding: 20px; z-index: 101; transition: bottom 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            max-height: 85dvh; overflow-y: auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        .inspector.open { bottom: 0; }
        .inspector-overlay.open { opacity: 1; pointer-events: all; }

        .drag-handle { width: 40px; height: 5px; background: var(--border-light); border-radius: 10px; margin: 0 auto 20px auto; }
        
        .insp-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .insp-date-title { font-size: 1.5rem; font-weight: 900; line-height: 1.1; }
        .insp-date-sub { font-size: 0.9rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-top: 4px; }
        
        .btn-close {
            background: rgba(255,255,255,0.1); border: none; color: var(--text-muted);
            width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; font-size: 1.2rem;
        }
        .btn-close:active { transform: scale(0.9); background: var(--danger); color: white; }

        /* Kártyák az Inspectorban */
        .detail-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 15px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 15px; position: relative; overflow: hidden;
        }
        .detail-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent); }
        .card-holiday::before { background: var(--danger); }
        .card-A::before { background: var(--color-a); }
        .card-B::before { background: var(--color-b); }
        .card-C::before { background: var(--color-c); }
        .card-D::before { background: var(--color-d); }
        .card-OFF::before { background: var(--text-muted); }
        .card-OFF { opacity: 0.8; }

        .card-content { flex: 1; }
        .card-label { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .card-value { font-size: 1.1rem; font-weight: 800; color: var(--text-main); margin-top: 4px; }
        .card-holiday .card-value { color: var(--danger); }

        .big-badge {
            width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: 900; color: white;
        }
        .bg-A { background: var(--color-a); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .bg-B { background: var(--color-b); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        .bg-C { background: var(--color-c); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4); }
        .bg-D { background: var(--color-d); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
        .bg-OFF { background: var(--border-light); }

        /* --- DESKTOP DASHBOARD (Min 1024px) --- */
        .btn-print { display: none; }
        @media (min-width: 1024px) {
            .btn-print { display: flex; }
            .filter-container { padding: 15px 30px; }
            .main-layout { flex-direction: row; padding: 0 15px 15px 15px; gap: 20px; }
            
            .calendar-section { flex: 2; background: var(--bg-panel); border-radius: 20px; border: 1px solid var(--border); padding: 20px; }
            .cell { min-height: 100px; }
            
            /* Inspector as fixed side panel */
            .inspector-overlay { display: none; }
            .inspector {
                position: static; flex: 1; border-radius: 20px; border: 1px solid var(--border);
                max-height: none; padding: 25px; box-shadow: none; display: flex; flex-direction: column;
            }
            .drag-handle, .btn-close { display: none; }
            #inspBody { flex: 1; overflow-y: auto; }
            
            .empty-state { text-align: center; color: var(--text-muted); margin-top: 50px; font-weight: 600; }
        }

        /* --- A4 NYOMTATÁSI NÉZET --- */
        @media print {
            @page { size: A4 portrait; margin: 15mm; }
            body { background: white !important; color: black !important; display: block; height: auto; }
            
            /* Elrejtjük a UI elemeket */
            .app-header .header-actions, .filter-container, .inspector, .inspector-overlay, .cal-nav-btn { display: none !important; }
            
            /* Fejléc formázása nyomtatáshoz */
            .app-header { background: transparent !important; border-bottom: 2px solid black !important; padding: 0 0 10px 0; height: auto; margin-bottom: 20px; }
            .logo-area h1 { color: black !important; font-size: 1.8rem; }
            .logo-area span { color: var(--accent) !important; }
            .print-subtitle { display: block !important; font-size: 1.2rem; font-weight: 800; margin-top: 5px; }
            
            .main-layout { display: block; padding: 0; }
            .calendar-section { padding: 0; background: transparent !important; border: none !important; }
            
            .month-title { color: black !important; text-align: center; font-size: 1.8rem; margin-bottom: 20px; width: 100%; }
            .cal-header { justify-content: center; }
            
            .weekday { color: black !important; font-size: 1rem; padding-bottom: 10px; border-bottom: 1px solid #ccc; }
            
            .calendar-grid { gap: 2px; padding: 0; overflow: visible; display: grid; grid-template-rows: repeat(6, 1fr); height: 210mm; /* A4 magasság kihasználása */ }
            
            .cell { background: white !important; border: 1px solid #aaa !important; border-radius: 0 !important; min-height: auto; padding: 8px; box-shadow: none !important; }
            .cell.empty { border: none !important; }
            .date-num { color: black !important; font-size: 1.2rem; }
            .cell.weekend { background: #f8f9fa !important; }
            
            /* Színek nyomtatása (Böngészőfüggő, kell a print-color-adjust) */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            
            .shift-pill { font-size: 0.8rem; padding: 4px 8px; border-radius: 4px; margin-top: 4px; border: 1px solid rgba(0,0,0,0.1); }
            .pill-A { background: var(--color-a) !important; color: white !important; }
            .pill-B { background: var(--color-b) !important; color: white !important; }
            .pill-C { background: var(--color-c) !important; color: white !important; }
            .pill-D { background: var(--color-d) !important; color: white !important; }
        }

        .print-subtitle { display: none; }
    </style>
</head>

    <header class="app-header">

            <button class="btn-modern btn-today" onclick="jumpToToday()">Mai Nap</button>
            <button class="btn-modern btn-print" onclick="window.print()">🖨️ Nyomtatás</button>

    <div class="filter-container">

            </div>
            
            <div class="cal-grid-wrapper" id="calWrapper">

            </div>
        </section>

        <aside class="inspector" id="inspectorDrawer">
            <div class="drag-handle"></div>
            <div class="insp-header">
                <div>

                </div>
                <button class="btn-close" onclick="closeInspector()">✕</button>
            </div>
            <div id="inspBody">
                <div class="empty-state desktop-only">Kattints egy napra a naptárban a részletes műszakinformációk megtekintéséhez.</div>
            </div>
        </aside>
    </main>

    <div class="inspector-overlay" id="drawerOverlay" onclick="closeInspector()"></div>

    };

    // --- MŰSZAK GENERÁTOR MOTOR ---
    const anchorDate = new Date(Date.UTC(2026, 0, 9)); 

    function getShiftForDate(dateObj) {
        const utcDate = new Date(Date.UTC(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate()));
        const diffDays = Math.floor((utcDate - anchorDate) / 86400000);
        const cycleDay = ((diffDays % 12) + 12) % 12;

        if (cycleDay >= 0 && cycleDay <= 2) return { day: 'A', night: 'B', off: ['C', 'D'] };
        if (cycleDay >= 3 && cycleDay <= 5) return { day: 'C', night: 'D', off: ['A', 'B'] };
        if (cycleDay >= 6 && cycleDay <= 8) return { day: 'B', night: 'A', off: ['C', 'D'] };
        if (cycleDay >= 9 && cycleDay <= 11) return { day: 'D', night: 'C', off: ['A', 'B'] };
    }

    // --- ÁLLAPOT ÉS VÁLTOZÓK ---
    let currentDate = new Date();
    const todayStr = new Date().toISOString().split('T')[0];
    let currentFilter = 'ALL';
    
    const monthNames = ["Január","Február","Március","Április","Május","Június","Július","Augusztus","Szeptember","Október","November","December"];
    const dayNames = ["Vasárnap","Hétfő","Kedd","Szerda","Csütörtök","Péntek","Szombat"];

    // --- INICIALIZÁLÁS ---
    window.onload = () => {
        initSegmentedControl();
        renderCalendar();
        setupSwipe();
    };

    // --- SEGMENTED CONTROL LOGIKA ---
    function initSegmentedControl() {
        const slider = document.getElementById('segSlider');
        slider.style.width = '20%';
        slider.style.transform = 'translateX(0%)';
    }

    function setFilter(shift, index) {
        currentFilter = shift;
        
        // UI Frissítés
        const btns = document.querySelectorAll('.seg-btn');
        btns.forEach(btn => btn.classList.remove('active'));
        btns[index].classList.add('active');
        
        const slider = document.getElementById('segSlider');
        slider.style.transform = `translateX(${index * 100}%)`;
        
        renderCalendar();
    }

    // --- NAPTÁR LOGIKA ÉS ANIMÁCIÓ ---
    function jumpToToday() {
        currentDate = new Date();
        animateRender(0);
    }

    function changeMonth(delta) {
        animateRender(delta);
    }

    function animateRender(delta) {
        const grid = document.getElementById('calGrid');
        // Kifelé animáció
        grid.style.transform = delta > 0 ? 'translateX(-20px)' : (delta < 0 ? 'translateX(20px)' : 'scale(0.98)');
        grid.style.opacity = '0';
        
        setTimeout(() => {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
            
            // Befelé animáció előkészítése
            grid.style.transform = delta > 0 ? 'translateX(20px)' : (delta < 0 ? 'translateX(-20px)' : 'scale(1.02)');
            
            // Kényszerített reflow, hogy a CSS észrevegye a változást
            void grid.offsetWidth;
            
            // Visszaállás
            grid.style.transform = 'translateX(0) scale(1)';
            grid.style.opacity = '1';
        }, 150);
    }

    function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        document.getElementById('monthLabel').innerText = `${year} ${monthNames[month].toUpperCase()}`;
        
        const grid = document.getElementById('calGrid');
        grid.innerHTML = '';
        
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);
        let startDayIndex = firstDay.getDay() - 1; 
        if(startDayIndex === -1) startDayIndex = 6; 

        // Üres cellák
        for(let i = 0; i < startDayIndex; i++) { 
            grid.innerHTML += `<div class="cell empty"></div>`; 
        }
        
        // Napok
        for(let i = 1; i <= lastDay.getDate(); i++) {
            const iterDate = new Date(year, month, i);
            const isoDate = new Date(iterDate.getTime() - (iterDate.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            const isToday = isoDate === todayStr;
            const isWeekend = iterDate.getDay() === 0 || iterDate.getDay() === 6;
            
            const shiftData = getShiftForDate(iterDate);
            const mmdd = `${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const holidayName = unnepnapok[mmdd];
            
            let cellClass = `cell ${isToday ? 'today' : ''} ${isWeekend ? 'weekend' : ''}`;
            let shiftsHtml = '';

            // Műszak Pilulák
            if(currentFilter === 'ALL') {
                shiftsHtml = `
                    <div class="shift-pill pill-${shiftData.day}">
                        <span>Nappal</span><strong>${shiftData.day}</strong>
                    </div>
                    <div class="shift-pill pill-${shiftData.night}">
                        <span>Éjjel</span><strong>${shiftData.night}</strong>
                    </div>
                `;
            } else {
                if(shiftData.day === currentFilter) {
                    shiftsHtml = `<div class="shift-pill pill-${shiftData.day} highlight"><strong>NAPPALOS</strong></div>`;
                } else if(shiftData.night === currentFilter) {
                    shiftsHtml = `<div class="shift-pill pill-${shiftData.night} highlight"><strong>ÉJSZAKÁS</strong></div>`;
                } else {
                    cellClass += ' dimmed';
                }
            }

            const cell = document.createElement('div');
            cell.className = cellClass;
            cell.innerHTML = `
                <div class="cell-header">
                    <span class="date-num">${i}</span>
                    ${holidayName ? '<div class="holiday-dot"></div>' : ''}
                </div>
                <div class="shifts-container">${shiftsHtml}</div>
            `;
            
            cell.onclick = () => openInspector(iterDate, shiftData, holidayName, mmdd);
            grid.appendChild(cell);
        }
    }

    // --- SWIPE LOGIKA (MOBILRA) ---
    function setupSwipe() {
        const wrapper = document.getElementById('calWrapper');
        let touchStartX = 0;
        let touchEndX = 0;

        wrapper.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        wrapper.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const threshold = 50;
            if (touchEndX < touchStartX - threshold) changeMonth(1); // Balra húzás -> Következő
            if (touchEndX > touchStartX + threshold) changeMonth(-1); // Jobbra húzás -> Előző
        }
    }

    // --- INSPECTOR (RÉSZLETEK) ---
    const drawer = document.getElementById('inspectorDrawer');
    const overlay = document.getElementById('drawerOverlay');

    function openInspector(dateObj, shiftData, holidayName, mmdd) {
        const year = dateObj.getFullYear();
        const monthName = monthNames[dateObj.getMonth()];
        const day = String(dateObj.getDate()).padStart(2, '0');
        
        document.getElementById('inspDate').innerText = `${year}. ${monthName} ${day}.`;
        document.getElementById('inspDayName').innerText = dayNames[dateObj.getDay()];

        let html = '';

        if(holidayName) {
            html += `
                <div class="detail-card card-holiday">
                    <div class="card-content">
                        <div class="card-label">Ünnepnap</div>
                        <div class="card-value">${holidayName}</div>
                    </div>
                </div>
            `;
        }

        const nameDay = nevnapok[mmdd];
        if(nameDay) {
            html += `
                <div class="detail-card">
                    <div class="card-content">
                        <div class="card-label">Mai Névnap</div>
                        <div class="card-value">${nameDay}</div>
                    </div>
                </div>
            `;
        }

        // Műszak Kártyák Inspectorba
        if(currentFilter === 'ALL' || currentFilter === shiftData.day) {
            html += `
                <div class="detail-card card-${shiftData.day}">
                    <div class="card-content">
                        <div class="card-label">06:00 - 18:00</div>
                        <div class="card-value">Nappalos Műszak</div>
                    </div>
                    <div class="big-badge bg-${shiftData.day}">${shiftData.day}</div>
                </div>
            `;
        }

        if(currentFilter === 'ALL' || currentFilter === shiftData.night) {
            html += `
                <div class="detail-card card-${shiftData.night}">
                    <div class="card-content">
                        <div class="card-label">18:00 - 06:00</div>
                        <div class="card-value">Éjszakás Műszak</div>
                    </div>
                    <div class="big-badge bg-${shiftData.night}">${shiftData.night}</div>
                </div>
            `;
        }

        if(currentFilter === 'ALL' || shiftData.off.includes(currentFilter)) {
            const isTargetOff = shiftData.off.includes(currentFilter);
            html += `
                <div class="detail-card card-OFF" ${isTargetOff ? 'style="border-color:var(--accent); opacity:1;"' : ''}>
                    <div class="card-content">
                        <div class="card-label">Szabadnap</div>
                        <div class="card-value">Pihenőidő</div>
                    </div>
                    <div style="display:flex; gap:5px;">
                        ${isTargetOff 
                            ? `<div class="big-badge bg-OFF" style="color:var(--text-main)">${currentFilter}</div>`
                            : `<div class="big-badge bg-OFF" style="font-size:1rem;">${shiftData.off[0]}</div><div class="big-badge bg-OFF" style="font-size:1rem;">${shiftData.off[1]}</div>`
                        }
                    </div>
                </div>
            `;
        }

        document.getElementById('inspBody').innerHTML = html;
        
        // Csak mobilon nyitjuk fel alulról, asztalin fixen ott van
        if(window.innerWidth < 1024) {
            drawer.classList.add('open');
            overlay.classList.add('open');
        }
    }

    function closeInspector() {
        drawer.classList.remove('open');
        overlay.classList.remove('open');
    }

    // Swipe lefelé a bezáráshoz (Mobilon)
    let inspTouchY = 0;
    drawer.addEventListener('touchstart', e => inspTouchY = e.changedTouches[0].screenY, {passive: true});
    drawer.addEventListener('touchend', e => {
        if(window.innerWidth < 1024 && e.changedTouches[0].screenY > inspTouchY + 50) closeInspector();
    }, {passive: true});

</script>
