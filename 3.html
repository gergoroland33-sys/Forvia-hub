<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Forvia SMT | Pro Premium Műszaknaptár</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        :root {
            /* Premium Dark Theme */
            --bg-base: #020617;
            --bg-panel: rgba(15, 23, 42, 0.7);
            --bg-card: rgba(30, 41, 59, 0.8);
            --border: rgba(51, 65, 85, 0.6);
            --border-light: rgba(71, 85, 105, 0.4);
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --danger: #ef4444; 
            
            /* Shift Colors */
            --color-a: #3b82f6;
            --color-b: #10b981;
            --color-c: #f59e0b;
            --color-d: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100dvh; 
            overflow: hidden; 
            touch-action: manipulation; 
        }

        /* --- APP HEADER --- */
        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 15px; 
            background: var(--bg-panel);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            height: 55px; flex-shrink: 0;
            z-index: 10;
        }

        .logo-area h1 { margin: 0; font-size: 1.2rem; font-weight: 900; letter-spacing: 0.5px; }
        .logo-area span { color: var(--accent); }

        .header-actions { display: flex; gap: 8px; }

        .btn-modern {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
            color: var(--text-main); padding: 6px 12px; border-radius: 8px;
            font-size: 0.75rem; font-weight: 700; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .btn-today { color: var(--danger); border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.1); }
        .btn-print { display: none; }
        @media (min-width: 768px) { .btn-print { display: flex; } }

        /* --- SZŰRŐ SÁV & TÚLÓRA GOMB --- */
        .filter-container { padding: 8px 15px; background: var(--bg-base); flex-shrink: 0; display: flex; flex-direction: column; gap: 8px;}
        .segmented-control {
            display: flex; background: rgba(15, 23, 42, 0.8);
            border-radius: 10px; padding: 4px; border: 1px solid var(--border);
            position: relative; height: 36px;
        }
        .seg-btn {
            flex: 1; text-align: center; display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: 700; color: var(--text-muted);
            cursor: pointer; z-index: 2; transition: color 0.3s;
        }
        .seg-btn.active { color: var(--text-main); }
        .seg-slider {
            position: absolute; top: 4px; bottom: 4px;
            background: rgba(255,255,255,0.1); border-radius: 8px;
            z-index: 1; transition: transform 0.3s ease, width 0.3s;
            pointer-events: none; 
        }

        .overtime-container {
            display: none; animation: fadeInDown 0.3s ease-out;
        }
        .btn-overtime {
            width: 100%; background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(139, 92, 246, 0.15) 100%);
            border: 1px solid var(--accent); color: var(--text-main); 
            padding: 8px; border-radius: 10px; font-weight: 800; font-size: 0.8rem;
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; 
            transition: all 0.2s;
        }
        .btn-overtime:active { transform: scale(0.98); background: rgba(59, 130, 246, 0.25); }

        /* --- NAPTÁR SZEKCIÓ --- */
        .calendar-section {
            flex: 1; display: flex; flex-direction: column;
            padding: 0 10px 10px 10px; overflow: hidden;
        }

        .cal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; flex-shrink: 0;
        }
        .cal-nav-btn {
            background: transparent; border: none; color: var(--text-muted);
            font-size: 1.5rem; cursor: pointer; padding: 0 15px;
        }
        .month-title { font-size: 1.1rem; font-weight: 900; letter-spacing: 1px; }

        .weekdays {
            display: grid; grid-template-columns: repeat(7, 1fr);
            text-align: center; margin-bottom: 6px; flex-shrink: 0;
        }
        .weekday { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }

        .cal-grid-wrapper { flex: 1; overflow: hidden; position: relative; }
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 4px; height: 100%; width: 100%;
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
        }

        .cell {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 8px; padding: 4px; 
            display: flex; flex-direction: column; overflow: hidden;
        }
        .cell.empty { background: transparent; border: none; }
        .cell.today { border: 2px solid var(--danger); background: rgba(239, 68, 68, 0.05); }
        
        .cell-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: auto;}
        .date-num { font-size: 0.85rem; font-weight: 800; color: var(--text-main); line-height: 1;}
        .cell.weekend .date-num { color: var(--text-muted); }
        .cell.today .date-num { color: var(--danger); }
        .holiday-dot { width: 5px; height: 5px; background: var(--danger); border-radius: 50%; }

        .shifts-container { display: flex; flex-direction: column; gap: 2px; margin-top: 2px; }
        .shift-pill {
            font-size: clamp(0.55rem, 1.5vh, 0.7rem);
            font-weight: 800; padding: 2px 4px; border-radius: 4px;
            display: flex; justify-content: space-between; align-items: center;
            white-space: nowrap; overflow: hidden;
        }
        .shift-pill span { opacity: 0.8; font-weight: 600; margin-right: 4px;}
        @media (max-width: 400px) { .shift-pill span { display: none; } .shift-pill { justify-content: center; } }

        .pill-A { background: rgba(59, 130, 246, 0.2); color: #93c5fd; }
        .pill-B { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        .pill-C { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }
        .pill-D { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }

        .cell.dimmed { opacity: 0.15; filter: grayscale(1); }
        .shift-pill.highlight { justify-content: center; font-size: clamp(0.55rem, 1.2vh, 0.7rem); padding: 3px 2px; border: 1px solid currentColor; }
        .shift-pill.highlight span { display: none; }

        /* --- MODAL (TÚLÓRA) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 100; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal-content {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
            width: 92%; max-width: 420px; max-height: 90vh; display: flex; flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); transform: translateY(30px); transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .modal-header { 
            padding: 15px; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .modal-header h2 { margin: 0; font-size: 1.1rem; font-weight: 800; color: var(--text-main); display: flex; align-items: center; gap: 8px;}
        .btn-close { 
            background: rgba(255,255,255,0.1); border: none; color: var(--text-main); 
            width: 30px; height: 30px; border-radius: 50%; font-size: 1.2rem; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        
        .modal-body { padding: 15px; overflow-y: auto; flex: 1; }
        .period-select { 
            width: 100%; padding: 12px; background: rgba(2,6,23,0.8); color: var(--text-main); 
            border: 1px solid var(--accent); border-radius: 10px; margin-bottom: 15px; 
            outline: none; font-size: 0.9rem; font-weight: 600; font-family: inherit;
        }
        
        /* Toggles & Info Items */
        .holiday-item { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--border-light); 
            padding: 12px; border-radius: 10px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .holiday-info { display: flex; flex-direction: column; gap: 4px; }
        .h-date { font-size: 0.85rem; font-weight: 800; color: var(--text-main); }
        .h-name { font-size: 0.75rem; color: var(--text-muted); font-weight: 600;}
        
        .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0;}
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border); transition: .3s; border-radius: 24px; }
        .toggle-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: var(--text-main); transition: .3s; border-radius: 50%; }
        input:checked + .toggle-slider { background-color: var(--accent); }
        input:checked + .toggle-slider:before { transform: translateX(20px); }

        /* Eredmény doboz */
        .result-box { margin-top: 20px; background: rgba(2,6,23,0.6); border: 1px solid var(--border); border-radius: 12px; padding: 15px; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.85rem; color: var(--text-muted); font-weight: 600;}
        .res-row strong { color: var(--text-main); font-size: 0.95rem;}
        .res-total { 
            display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; 
            border-top: 1px solid var(--border); font-size: 1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .res-total strong { font-size: 1.4rem; }
        .res-total .positive { color: var(--color-b); }
        .res-total .negative { color: var(--danger); }
        .res-total .neutral { color: var(--text-main); }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- NYOMTATÁSI NÉZET --- */
        #printContainer { display: none; }

        @media print {
            @page { size: A4 portrait; margin: 10mm; }
            body { background: white !important; color: black !important; display: block; height: auto; overflow: visible; }
            .app-header, .filter-container, .main-layout, .modal-overlay { display: none !important; }
            #printContainer { display: block !important; width: 100%; height: 100%; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

            .print-header { text-align: center; margin-bottom: 10px; border-bottom: 2px solid black; padding-bottom: 10px; }
            .print-header h1 { font-size: 16pt; margin: 0; color: black; font-weight: 900; }
            
            .year-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr); gap: 6px; height: 260mm; }
            
            .print-month-box { border: 1px solid #000; padding: 4px; display: flex; flex-direction: column; }
            .print-month-title { text-align: center; font-weight: 800; font-size: 10pt; background: #eee; border-bottom: 1px solid #000; margin: -4px -4px 4px -4px; padding: 2px 0; text-transform: uppercase;}
            
            .print-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 6pt; font-weight: bold; border-bottom: 1px solid #ccc; margin-bottom: 2px; }
            
            .print-days-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(6, 1fr); gap: 1px; flex: 1; }
            
            .print-cell { border: 1px solid #666; border-radius: 3px; display: flex; flex-direction: column; padding: 1px; font-size: 6pt; overflow: hidden; position: relative;}
            .print-cell.empty { border: none; }
            .print-cell.weekend { background: #f9f9f9; }
            
            .print-date-num { font-weight: 900; line-height: 1; text-align: center; }
            .print-shifts { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 1px; }
            
            .p-pill { width: 90%; font-size: 5pt; font-weight: 900; text-align: center; border-radius: 2px; color: white !important; line-height: 1.1; padding: 1px 0;}
            .p-A { background: var(--color-a) !important; }
            .p-B { background: var(--color-b) !important; }
            .p-C { background: var(--color-c) !important; }
            .p-D { background: var(--color-d) !important; }
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="logo-area">
            <h1>FORVIA <span>SMT</span></h1>
        </div>
        <div class="header-actions">
            <button class="btn-modern btn-today" onclick="jumpToToday()">Mai</button>
            <button class="btn-modern btn-print" onclick="prepareAndPrint()">🖨️ Éves Nyomtatás</button>
        </div>
    </header>

    <div class="filter-container">
        <div class="segmented-control" id="segControl">
            <div class="seg-slider" id="segSlider"></div>
            <div class="seg-btn active" onclick="setFilter('ALL', 0)">Összes</div>
            <div class="seg-btn" onclick="setFilter('A', 1)">"A"</div>
            <div class="seg-btn" onclick="setFilter('B', 2)">"B"</div>
            <div class="seg-btn" onclick="setFilter('C', 3)">"C"</div>
            <div class="seg-btn" onclick="setFilter('D', 4)">"D"</div>
        </div>
        <!-- Keret elszámolás gomb -->
        <div class="overtime-container" id="overtimeBtnContainer">
            <button class="btn-overtime" onclick="openOvertimeModal()">
                ⏱️ Negyedéves Keret Elszámolás (Túlóra)
            </button>
        </div>
    </div>

    <main class="main-layout">
        <section class="calendar-section">
            <div class="cal-header">
                <button class="cal-nav-btn" onclick="changeMonth(-1)">&#10094;</button>
                <div class="month-title" id="monthLabel"></div>
                <button class="cal-nav-btn" onclick="changeMonth(1)">&#10095;</button>
            </div>
            
            <div class="weekdays">
                <div class="weekday">H</div><div class="weekday">K</div><div class="weekday">Sze</div>
                <div class="weekday">Cs</div><div class="weekday">P</div><div class="weekday">Szo</div><div class="weekday">V</div>
            </div>
            
            <div class="cal-grid-wrapper" id="calWrapper">
                <div class="calendar-grid" id="calGrid"></div>
            </div>
        </section>
    </main>

    <div id="printContainer"></div>

    <!-- Túlóra Modal -->
    <div class="modal-overlay" id="otModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⏱️ <span id="otShiftLabel"></span> Műszak Elszámolás</h2>
                <button class="btn-close" onclick="closeOvertimeModal()">×</button>
            </div>
            <div class="modal-body">
                <select class="period-select" id="periodSelect" onchange="calculateAndRenderOvertime()"></select>
                
                <div id="holidayQuestions"></div>
                
                <div class="result-box">
                    <div class="res-row"><span>Törvényes alap munkaidő:</span> <strong id="resBase">0 óra</strong></div>
                    <div class="res-row"><span>Ténylegesen ledolgozott:</span> <strong id="resWorked">0 óra</strong></div>
                    <div class="res-total">
                        <span>Túllépés:</span> 
                        <strong id="resDiff">0 óra</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    const unnepnapok = {
        "01-01": "Újév", "03-15": "Nemzeti Ünnep", "04-03": "Nagypéntek", "04-05": "Húsvét",
        "04-06": "Húsvéthétfő", "05-01": "Munka", "05-24": "Pünkösd", "05-25": "Pünkösd",
        "08-20": "Államalapítás", "10-23": "1956", "11-01": "Mindenszentek",
        "12-24": "Szenteste", "12-25": "Karácsony", "12-26": "Karácsony"
    };

    const anchorDate = new Date(Date.UTC(2026, 0, 9)); 

    function getShiftForDate(dateObj) {
        const utcDate = new Date(Date.UTC(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate()));
        const diffDays = Math.floor((utcDate - anchorDate) / 86400000);
        const cycleDay = ((diffDays % 12) + 12) % 12;

        if (cycleDay >= 0 && cycleDay <= 2) return { day: 'A', night: 'B' };
        if (cycleDay >= 3 && cycleDay <= 5) return { day: 'C', night: 'D' };
        if (cycleDay >= 6 && cycleDay <= 8) return { day: 'B', night: 'A' };
        if (cycleDay >= 9 && cycleDay <= 11) return { day: 'D', night: 'C' };
    }

    let currentDate = new Date();
    const todayStr = new Date().toISOString().split('T')[0];
    let currentFilter = 'ALL';
    
    const monthNames = ["Január","Február","Március","Április","Május","Június","Július","Augusztus","Szeptember","Október","November","December"];

    function initSegmentedControl() {
        const slider = document.getElementById('segSlider');
        slider.style.width = '20%';
        slider.style.transform = 'translateX(0%)';
    }

    function setFilter(shift, index) {
        currentFilter = shift;
        const btns = document.querySelectorAll('.seg-btn');
        btns.forEach(btn => btn.classList.remove('active'));
        btns[index].classList.add('active');
        document.getElementById('segSlider').style.transform = `translateX(${index * 100}%)`;
        
        // Gomb megjelenítése/elrejtése
        const otBtn = document.getElementById('overtimeBtnContainer');
        if (shift === 'ALL') {
            otBtn.style.display = 'none';
        } else {
            otBtn.style.display = 'block';
        }

        renderCalendar();
    }

    function jumpToToday() {
        currentDate = new Date();
        animateRender(0);
    }

    function changeMonth(delta) {
        animateRender(delta);
    }

    function animateRender(delta) {
        const grid = document.getElementById('calGrid');
        grid.style.transform = delta > 0 ? 'translateX(-15px)' : (delta < 0 ? 'translateX(15px)' : 'scale(0.98)');
        grid.style.opacity = '0';
        
        setTimeout(() => {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
            grid.style.transform = delta > 0 ? 'translateX(15px)' : (delta < 0 ? 'translateX(-15px)' : 'scale(1.02)');
            void grid.offsetWidth;
            grid.style.transform = 'translateX(0) scale(1)';
            grid.style.opacity = '1';
        }, 150);
    }

    function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        document.getElementById('monthLabel').innerText = `${year} ${monthNames[month].toUpperCase()}`;
        
        const grid = document.getElementById('calGrid');
        grid.innerHTML = '';
        
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);
        let startDayIndex = firstDay.getDay() - 1; 
        if(startDayIndex === -1) startDayIndex = 6; 

        let totalCells = 42;
        let dayCounter = 1;

        for(let i = 0; i < totalCells; i++) {
            if (i < startDayIndex || dayCounter > lastDay.getDate()) {
                grid.innerHTML += `<div class="cell empty"></div>`;
                continue;
            }

            const iterDate = new Date(year, month, dayCounter);
            const isoDate = new Date(iterDate.getTime() - (iterDate.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            const isToday = isoDate === todayStr;
            const isWeekend = iterDate.getDay() === 0 || iterDate.getDay() === 6;
            
            const shiftData = getShiftForDate(iterDate);
            const mmdd = `${String(month + 1).padStart(2, '0')}-${String(dayCounter).padStart(2, '0')}`;
            const holidayName = unnepnapok[mmdd];
            
            let cellClass = `cell ${isToday ? 'today' : ''} ${isWeekend ? 'weekend' : ''}`;
            let shiftsHtml = '';

            if(currentFilter === 'ALL') {
                shiftsHtml = `
                    <div class="shift-pill pill-${shiftData.day}"><span>N</span><strong>${shiftData.day}</strong></div>
                    <div class="shift-pill pill-${shiftData.night}"><span>É</span><strong>${shiftData.night}</strong></div>
                `;
            } else {
                if(shiftData.day === currentFilter) {
                    shiftsHtml = `<div class="shift-pill pill-${shiftData.day} highlight"><strong>NAPPAL</strong></div>`;
                } else if(shiftData.night === currentFilter) {
                    shiftsHtml = `<div class="shift-pill pill-${shiftData.night} highlight"><strong>ÉJJEL</strong></div>`;
                } else {
                    cellClass += ' dimmed';
                }
            }

            grid.innerHTML += `
                <div class="${cellClass}">
                    <div class="cell-header">
                        <span class="date-num">${dayCounter}</span>
                        ${holidayName ? '<div class="holiday-dot"></div>' : ''}
                    </div>
                    <div class="shifts-container">${shiftsHtml}</div>
                </div>
            `;
            dayCounter++;
        }
    }

    function setupSwipe() {
        const wrapper = document.getElementById('calWrapper');
        let touchStartX = 0; let touchEndX = 0;
        
        wrapper.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
        }, {passive: true});
        
        wrapper.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].clientX;
            if (touchEndX < touchStartX - 40) changeMonth(1);
            if (touchEndX > touchStartX + 40) changeMonth(-1);
        }, {passive: true});
    }

    function prepareAndPrint() {
        const year = currentDate.getFullYear();
        const container = document.getElementById('printContainer');
        
        let html = `
            <div class="print-header">
                <h1>FORVIA SMT Éves Műszakbeosztás - ${year}</h1>
            </div>
            <div class="year-grid">
        `;

        for(let m = 0; m < 12; m++) {
            html += `<div class="print-month-box">`;
            html += `<div class="print-month-title">${monthNames[m]}</div>`;
            html += `<div class="print-weekdays"><div>H</div><div>K</div><div>Sz</div><div>Cs</div><div>P</div><div>Sz</div><div>V</div></div>`;
            
            html += `<div class="print-days-grid">`;
            const firstDay = new Date(year, m, 1);
            const lastDay = new Date(year, m + 1, 0);
            let startDayIndex = firstDay.getDay() - 1; 
            if(startDayIndex === -1) startDayIndex = 6; 

            let dayCounter = 1;
            for(let i = 0; i < 42; i++) {
                if (i < startDayIndex || dayCounter > lastDay.getDate()) {
                    html += `<div class="print-cell empty"></div>`;
                    continue;
                }

                const iterDate = new Date(year, m, dayCounter);
                const isWeekend = iterDate.getDay() === 0 || iterDate.getDay() === 6;
                const shiftData = getShiftForDate(iterDate);
                
                html += `
                    <div class="print-cell ${isWeekend ? 'weekend' : ''}">
                        <div class="print-date-num">${dayCounter}</div>
                        <div class="print-shifts">
                            <div class="p-pill p-${shiftData.day}">${shiftData.day}</div>
                            <div class="p-pill p-${shiftData.night}">${shiftData.night}</div>
                        </div>
                    </div>
                `;
                dayCounter++;
            }
            html += `</div></div>`; 
        }

        html += `</div>`; 
        container.innerHTML = html;

        setTimeout(() => { window.print(); }, 100);
    }

    /* --- TÚLÓRA (KERET) LOGIKA JAVÍTVA! --- */
    let holidayOverrides = {};
    let currentPeriods = [];

    function openOvertimeModal() {
        buildPeriods();
        document.getElementById('otShiftLabel').innerText = `"${currentFilter}"`;
        document.getElementById('otModal').classList.add('active');
        calculateAndRenderOvertime();
    }

    function closeOvertimeModal() {
        document.getElementById('otModal').classList.remove('active');
    }

    function buildPeriods() {
        const y = currentDate.getFullYear();
        // A kifizetési negyedévek (Feb-Ápr -> Május, Máj-Júl -> Augusztus, stb.)
        currentPeriods = [
            { name: `Nov (${y-1}) - Jan (${y}) | Februári kifizetés`, start: new Date(y-1, 10, 1), end: new Date(y, 1, 0) },
            { name: `Február - Április (${y}) | Májusi kifizetés`, start: new Date(y, 1, 1), end: new Date(y, 4, 0) },
            { name: `Május - Július (${y}) | Augusztusi kifizetés`, start: new Date(y, 4, 1), end: new Date(y, 7, 0) },
            { name: `Augusztus - Október (${y}) | Novemberi kifizetés`, start: new Date(y, 7, 1), end: new Date(y, 10, 0) }
        ];
        
        const select = document.getElementById('periodSelect');
        select.innerHTML = '';
        
        const m = currentDate.getMonth(); 
        let defaultIdx = 1; 
        if (m >= 1 && m <= 3) defaultIdx = 1; // Feb-Ápr
        else if (m >= 4 && m <= 6) defaultIdx = 2; // Máj-Júl
        else if (m >= 7 && m <= 9) defaultIdx = 3; // Aug-Okt
        else defaultIdx = 0; // Nov-Jan

        currentPeriods.forEach((p, idx) => {
            select.innerHTML += `<option value="${idx}" ${idx === defaultIdx ? 'selected' : ''}>${p.name}</option>`;
        });
    }

    function calculateAndRenderOvertime() {
        const pIdx = document.getElementById('periodSelect').value;
        const period = currentPeriods[pIdx];
        const shift = currentFilter;
        
        let baseHours = 0;
        let workedHours = 0;
        let holidayHTML = '';

        // Végigmegyünk a kiválasztott periódus minden napján
        for (let d = new Date(period.start); d <= period.end; d.setDate(d.getDate() + 1)) {
            let year = d.getFullYear();
            let month = String(d.getMonth() + 1).padStart(2, '0');
            let day = String(d.getDate()).padStart(2, '0');
            let mmdd = `${month}-${day}`;
            let dateStr = `${year}-${mmdd}`;
            
            let isWeekend = (d.getDay() === 0 || d.getDay() === 6);
            let isHoliday = !!unnepnapok[mmdd];
            
            // 1. Törvényes alap: Hétköznap + Nem ünnepnap = 8 óra
            if (!isWeekend && !isHoliday) {
                baseHours += 8;
            }
            
            // 2. Ténylegesen beosztott műszak vizsgálata
            let shiftData = getShiftForDate(d);
            let isDayShift = (shiftData.day === shift);
            let isNightShift = (shiftData.night === shift);
            
            if (isDayShift || isNightShift) {
                if (isHoliday) {
                    if (isNightShift) {
                        // ÚJ SZABÁLY: Ha éjszakás vagy ünnepnapon, akkor FIX 8 ÓRA (22:00 - 06:00), nincs kérdés!
                        workedHours += 8;
                        holidayHTML += `
                            <div class="holiday-item" style="opacity: 0.9; border-color: rgba(16, 185, 129, 0.4); background: rgba(16, 185, 129, 0.05);">
                                <div class="holiday-info">
                                    <span class="h-date">${monthNames[d.getMonth()]} ${d.getDate()}. - ${unnepnapok[mmdd]}</span>
                                    <span class="h-name">ÉJSZAKÁS (Fix 22:00-06:00)</span>
                                </div>
                                <div style="font-weight: 900; color: var(--color-b); font-size: 0.9rem;">+8 óra</div>
                            </div>
                        `;
                    } else {
                        // Nappalos műszak esetén maradt a kapcsoló (0 vagy 12 óra)
                        let overrideKey = `${dateStr}-day`;
                        
                        if (holidayOverrides[overrideKey] === undefined) {
                            holidayOverrides[overrideKey] = false; // Alapból nem dolgozott
                        }
                        
                        if (holidayOverrides[overrideKey]) {
                            workedHours += 12; 
                        }
                        
                        holidayHTML += `
                            <div class="holiday-item">
                                <div class="holiday-info">
                                    <span class="h-date">${monthNames[d.getMonth()]} ${d.getDate()}. - ${unnepnapok[mmdd]}</span>
                                    <span class="h-name">NAPPALOS (06:00-18:00)</span>
                                </div>
                                <label class="toggle-switch">
                                    <input type="checkbox" ${holidayOverrides[overrideKey] ? 'checked' : ''} onchange="toggleHoliday('${overrideKey}', this.checked)">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        `;
                    }
                } else {
                    // Normál napokon vagy hétvégéken fix 12 óra, ha be van osztva
                    workedHours += 12;
                }
            }
        }
        
        // UI Frissítés
        const hContainer = document.getElementById('holidayQuestions');
        if (holidayHTML !== '') {
            hContainer.innerHTML = `<div style="font-size: 0.8rem; color: var(--accent); margin-bottom: 10px; font-weight:700;">Érintett ünnepnapok:</div>` + holidayHTML;
        } else {
            hContainer.innerHTML = `<div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px; text-align: center; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px;">Ebben a 3 hónapban a beosztásod nem érintett ünnepnapot.</div>`;
        }
        
        let diff = workedHours - baseHours;
        let diffClass = diff > 0 ? 'positive' : (diff < 0 ? 'negative' : 'neutral');
        let diffSign = diff > 0 ? '+' : '';
        
        document.getElementById('resBase').innerText = `${baseHours} óra`;
        document.getElementById('resWorked').innerText = `${workedHours} óra`;
        document.getElementById('resDiff').innerHTML = `<span class="${diffClass}">${diffSign}${diff} óra</span>`;
    }

    function toggleHoliday(key, value) {
        holidayOverrides[key] = value;
        calculateAndRenderOvertime(); // Azonnali újraszámolás a UI-on!
    }

    // Inicializálás
    initSegmentedControl();
    renderCalendar();
    setupSwipe();

</script>
</body>
</html>
