<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Szemétkihordás - AUTO</title>
    <style>
        :root { --bg-dark: #09090b; --surface: #18181b; --primary: #8b5cf6; --accent: #06b6d4; --text-main: #ffffff; --text-dim: #a1a1aa; }
        body { background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; min-height: 100dvh; display: flex; flex-direction: column; }
        .hero-section { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 60px 20px 20px; background: radial-gradient(circle at 50% 0%, #2e1065, #09090b); }
        .header-pill { position: absolute; top: 18px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 8px 16px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; cursor: pointer; color: var(--text-dim); border: 1px solid rgba(255,255,255,0.05); }
        .pill-container { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 20px; }
        .worker-pill { display: flex; flex-direction: column; align-items: center; background: rgba(139, 92, 246, 0.15); padding: 15px 25px; border-radius: 16px; font-size: 1.2rem; font-weight: 800; border: 1px solid rgba(139, 92, 246, 0.3); }
        .carry-count { font-size: 0.7rem; color: var(--accent); margin-top: 5px; }
        .list-container { flex: 1; overflow-y: auto; padding: 20px; }
        .list-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 10px; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #adminPanel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; padding: 20px; overflow-y: auto; }
        .btn-reset { background: #f87171; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<section class="hero-section" id="heroContainer"></section>
<div class="list-container" id="upcomingList"></div>

<div id="adminPanel">
    <div style="max-width: 400px; margin: 40px auto; color: white;">
        <h2>Admin</h2>
        <button class="btn-reset" onclick="resetCarries()">🔄 PONTNULLÁZÁS</button>
        <button style="width:100%; padding:15px; margin-top:10px; background:#333; border:none; border-radius:8px; color:white;" onclick="closeAdmin()">Bezárás</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
<script>
    const db = firebase.database();
    let sysSettings = null, workerStats = {}, pairHistory = {}, computedSchedule = {};

    db.ref('settings').on('value', s => { sysSettings = s.val(); maybeRender(); });
    db.ref('workerStats').on('value', s => { workerStats = s.val() || {}; maybeRender(); });
    db.ref('pairHistory').on('value', s => { pairHistory = s.val() || {}; maybeRender(); });

    function getDateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    
    function selectPairForDay(availableWorkers, simStats, simPairs, currentDate) {
        if (availableWorkers.length < 2) return [availableWorkers[0] || "-", availableWorkers[1] || "-"];
        
        // VÉLETLEN FAKTOR HOZZÁADÁSA: Keverjük meg az elérhetőket, hogy ne mindig ugyanazt a párost válassza
        let shuffled = [...availableWorkers].sort(() => Math.random() - 0.5);
        
        let bestPair = null;
        let bestCost = Infinity;
        
        for (let i = 0; i < shuffled.length; i++) {
            for (let j = i + 1; j < shuffled.length; j++) {
                const a = shuffled[i], b = shuffled[j];
                const sa = simStats[a] || { carries: 0 };
                const sb = simStats[b] || { carries: 0 };
                
                // Költség számítás
                const cost = (sa.carries + sb.carries) * 100 + (simPairs[[a,b].sort().join('|')] || 0) * 1000;
                
                if (cost < bestCost) {
                    bestCost = cost;
                    bestPair = [a, b];
                }
            }
        }
        return bestPair;
    }

    function calculateAllSchedules() {
        computedSchedule = {};
        if (!sysSettings?.roster) return;
        
        let simStats = {}, simPairs = { ...pairHistory };
        sysSettings.roster.forEach(n => simStats[n] = { carries: (workerStats[n]?.carries || 0) });
        
        let d = new Date(); d.setHours(0,0,0,0);
        let endD = new Date(d); endD.setDate(d.getDate() + 30);

        while (d <= endD) {
            let key = getDateKey(d);
            let pair = selectPairForDay(sysSettings.roster, simStats, simPairs, d);
            computedSchedule[key] = pair;
            
            simStats[pair[0]].carries++;
            simStats[pair[1]].carries++;
            simPairs[[pair[0], pair[1]].sort().join('|')] = (simPairs[[pair[0], pair[1]].sort().join('|')] || 0) + 1;
            
            d.setDate(d.getDate() + 1);
        }
    }

    function maybeRender() {
        if (sysSettings) {
            calculateAllSchedules();
            renderUI();
        }
    }

    function renderUI() {
        const d = new Date(); d.setHours(0,0,0,0);
        const key = getDateKey(d);
        const pair = computedSchedule[key] || ["-", "-"];
        
        document.getElementById('heroContainer').innerHTML = `
            <div class="header-pill" onclick="document.getElementById('adminPanel').style.display='block'">ADMIN</div>
            <div class="today-label">MAI BEOSZTÁS</div>
            <div class="pill-container">
                <div class="worker-pill"><span>${pair[0]}</span><div class="carry-count">${workerStats[pair[0]]?.carries || 0}×</div></div>
                <div class="worker-pill"><span>${pair[1]}</span><div class="carry-count">${workerStats[pair[1]]?.carries || 0}×</div></div>
            </div>
        `;
        
        // Automatikus mentés: ha ez a nap még nincs rögzítve, most rögzítjük
        if (!workerStats[pair[0]]?.lastDate || workerStats[pair[0]].lastDate !== key) {
            const updates = {};
            updates[`workerStats/${pair[0]}/carries`] = (workerStats[pair[0]]?.carries || 0) + 1;
            updates[`workerStats/${pair[0]}/lastDate`] = key;
            updates[`workerStats/${pair[1]}/carries`] = (workerStats[pair[1]]?.carries || 0) + 1;
            updates[`workerStats/${pair[1]}/lastDate`] = key;
            db.ref().update(updates);
        }
    }

    function resetCarries() {
        if(confirm("Biztos nullázod?")) {
            const updates = { 'pairHistory': null };
            sysSettings.roster.forEach(n => updates[`workerStats/${n}/carries`] = 0);
            db.ref().update(updates);
        }
    }
    function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
</script>
</body>
</html>
